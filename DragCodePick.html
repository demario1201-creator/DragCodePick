<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">文件编码与字符串提取工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #0f1117 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: linear-gradient(180deg, rgba(30, 35, 50, 0.95) 0%, rgba(20, 23, 35, 0.98) 100%);
            border: 1px solid rgba(99, 179, 237, 0.15);
            border-radius: 20px;
            padding: 48px;
            max-width: 900px;
            width: 100%;
            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 0 100px rgba(99, 179, 237, 0.03);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            border-radius: 14px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
        }

        .logo svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        h1 {
            color: #f1f5f9;
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header-top {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .lang-toggle {
            display: flex;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
            position: absolute;
            top: 0;
            right: 0;
        }

        .lang-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #64748b;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .lang-btn:hover {
            color: #94a3b8;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .drop-zone {
            border: 2px dashed rgba(99, 179, 237, 0.3);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.5);
            position: relative;
            overflow: hidden;
        }

        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .drop-zone:hover::before {
            opacity: 1;
        }

        .drop-zone:hover {
            border-color: rgba(99, 179, 237, 0.5);
            background: rgba(15, 23, 42, 0.7);
        }

        .drop-zone.dragover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            transform: scale(1.01);
        }

        .drop-zone-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(6, 182, 212, 0.2) 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            transition: all 0.3s ease;
        }

        .drop-zone:hover .drop-zone-icon {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
        }

        .drop-zone-icon svg {
            width: 24px;
            height: 24px;
            color: #63b3ed;
        }

        .drop-zone-text {
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .drop-zone-hint {
            color: #64748b;
            font-size: 13px;
        }

        #fileInput {
            display: none;
        }

        .main-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(15, 23, 42, 0.5);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .main-tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .main-tab svg {
            width: 16px;
            height: 16px;
        }

        .main-tab:hover {
            color: #94a3b8;
        }

        .main-tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .main-tab.ctf.active {
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .encoding-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .encoding-tab {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.5);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
            transition: all 0.2s ease;
        }

        .encoding-tab:hover {
            border-color: rgba(99, 179, 237, 0.3);
            color: #94a3b8;
        }

        .encoding-tab.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.4);
            color: #63b3ed;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .quick-decode {
            margin-top: 20px;
            background: rgba(15, 23, 42, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 24px;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .quick-decode.dragover {
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(59, 130, 246, 0.06);
        }

        .quick-decode-title {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .quick-decode-input {
            width: 100%;
            height: 100px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            background: rgba(0, 0, 0, 0.3);
            color: #a5f3fc;
        }

        .quick-decode-input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .quick-decode-input::placeholder {
            color: #475569;
        }

        .quick-decode-drop-hint {
            color: #475569;
            font-size: 11px;
            text-align: center;
            margin-top: 8px;
        }

        .qd-decode-btn {
            margin-top: 8px;
            width: 100%;
        }

        .qd-ext-row {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .qd-ext-prefix {
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 0 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-right: none;
            border-radius: 8px 0 0 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .qd-ext-input {
            width: 80px;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0 8px 8px 0;
            background: rgba(0, 0, 0, 0.3);
            color: #a5f3fc;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .qd-ext-input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .qd-ext-input::placeholder {
            color: #475569;
        }

        .quick-decode-result {
            margin-top: 16px;
            display: none;
        }

        .quick-decode-preview {
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: auto;
            max-height: 300px;
        }

        .quick-decode-preview img {
            display: block;
            max-width: 100%;
            border-radius: 8px;
        }

        .quick-decode-preview pre {
            padding: 16px;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-wrap;
            word-break: break-all;
            background: rgba(0, 0, 0, 0.2);
        }

        .quick-decode-meta {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            font-size: 12px;
            color: #64748b;
        }

        .quick-decode-meta span {
            color: #94a3b8;
            font-weight: 500;
        }

        .result-section {
            margin-top: 32px;
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-info {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .file-info-item {
            text-align: center;
        }

        .file-info-label {
            color: #64748b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .file-info-value {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
        }

        .output-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .output-label {
            font-size: 13px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .output-length {
            font-size: 12px;
            color: #64748b;
            font-family: 'JetBrains Mono', monospace;
        }

        .base64-output {
            width: 100%;
            height: 180px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            background: rgba(0, 0, 0, 0.3);
            color: #a5f3fc;
            transition: all 0.2s ease;
        }

        .base64-output:focus {
            border-color: rgba(99, 179, 237, 0.4);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .base64-output::placeholder {
            color: #475569;
        }

        .format-note {
            font-size: 11px;
            color: #64748b;
            margin-top: 10px;
        }

        .extract-section {
            margin-top: 20px;
        }

        .extract-options {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .extract-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            transition: all 0.2s ease;
            user-select: none;
            background: rgba(15, 23, 42, 0.4);
        }

        .extract-option:hover {
            border-color: rgba(99, 179, 237, 0.2);
        }

        .extract-option.selected {
            border-color: rgba(99, 179, 237, 0.4);
            background: rgba(59, 130, 246, 0.1);
        }

        .extract-option input {
            display: none;
        }

        .extract-option .checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #475569;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .extract-option.selected .checkbox {
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            border-color: transparent;
        }

        .extract-option.selected .checkbox svg {
            width: 12px;
            height: 12px;
            color: white;
        }

        .extract-option .label {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
        }

        .extract-option.selected .label {
            color: #e2e8f0;
        }

        .result-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-title {
            font-size: 13px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .result-count {
            font-size: 11px;
            color: #0a0a0f;
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .extract-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .extract-items::-webkit-scrollbar {
            width: 6px;
        }

        .extract-items::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .extract-items::-webkit-scrollbar-thumb {
            background: rgba(99, 179, 237, 0.3);
            border-radius: 3px;
        }

        .extract-item {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 6px;
            padding: 6px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #63b3ed;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .extract-item:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(99, 179, 237, 0.4);
            transform: translateY(-1px);
        }

        .extract-item.flag {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(217, 70, 239, 0.15) 100%);
            border-color: rgba(139, 92, 246, 0.3);
            color: #c4b5fd;
        }

        .extract-item.flag:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.25) 0%, rgba(217, 70, 239, 0.25) 100%);
            border-color: rgba(139, 92, 246, 0.5);
        }

        .extract-empty {
            color: #475569;
            font-size: 13px;
            text-align: center;
            padding: 32px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
        }

        .btn-secondary {
            background: rgba(71, 85, 105, 0.3);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.5);
            color: #e2e8f0;
        }

        .btn-ctf {
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
        }

        .btn-ctf:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.35);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            padding: 14px 24px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 10px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .ctf-hint {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(217, 70, 239, 0.1) 100%);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ctf-hint svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .ctf-hint strong {
            color: #c4b5fd;
        }

        .extract-category {
            margin-bottom: 16px;
        }

        .extract-category:last-child {
            margin-bottom: 0;
        }

        .extract-category-title {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .extract-category-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: linear-gradient(180deg, #3b82f6 0%, #06b6d4 100%);
            border-radius: 2px;
        }

        .extract-category.flags .extract-category-title::before {
            background: linear-gradient(180deg, #8b5cf6 0%, #d946ef 100%);
        }

        .extract-category-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .extract-tab {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.5);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
            transition: all 0.2s ease;
        }

        .extract-tab:hover {
            border-color: rgba(99, 179, 237, 0.3);
            color: #94a3b8;
        }

        .extract-tab.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.4);
            color: #63b3ed;
        }

        .extract-item.credential {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
            color: #fbbf24;
        }

        .extract-item.credential:hover {
            background: rgba(245, 158, 11, 0.2);
            border-color: rgba(245, 158, 11, 0.5);
        }

        .extract-item.internal {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .extract-item.internal:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }

        .extract-item.special {
            background: rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.3);
            color: #c084fc;
        }

        .extract-item.special:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.5);
        }

        .extract-item.crypto {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .extract-item.crypto:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
        }

        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            margin: 24px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="logo">

        function t(key, replacements) {
            const text = TRANSLATIONS[key]?.[currentLang];
            if (text === undefined) {
                const fallback = TRANSLATIONS[key]?.zh;
                if (fallback === undefined) return key;
                if (!replacements) return fallback;
                return Object.entries(replacements).reduce((s, [k, v]) => s.replace(`{${k}}`, v), fallback);
            }
            if (!replacements) return text;
            return Object.entries(replacements).reduce((s, [k, v]) => s.replace(`{${k}}`, v), text);
        }

            if (ctfResults.length === 0) { showToast(t('toastNoExport')); return; }
            const flags = ctfResults.filter(r => r.isFlag);
            const keywords = ctfResults.filter(r => !r.isFlag);
            let content = `# ${t('ctfExportTitle')}\n`;
            content += `# FILE: ${fileName.textContent}\n`;
            content += `# TIME: ${new Date().toLocaleString()}\n`;
            content += `# FLAGS: ${flags.length} | KEYWORDS: ${keywords.length}\n`;
            content += `${'='.repeat(50)}\n\n`;
            if (flags.length > 0) {
                content += `# === FLAGS (${flags.length}) ===\n`;
                flags.forEach((f, i) => { content += `[${i + 1}] ${f.value}\n`; });
                content += '\n';
            }
            if (keywords.length > 0) {
                content += `# === KEYWORDS (${keywords.length}) ===\n`;
                const grouped = {};
                keywords.forEach(k => { if (!grouped[k.label]) grouped[k.label] = []; grouped[k.label].push(k.value); });
                for (const [label, values] of Object.entries(grouped)) {
                    content += `\n## ${label}:\n`;
                    values.forEach((v, i) => { content += `[${i + 1}] ${v}\n`; });
                }
            }
            const flagCount = flags.length > 0 ? `_${flags.length}flags` : '';
            downloadFile(content, `ctf_result_${fileName.textContent || 'output'}${flagCount}.txt`);
        });

        resetBtn.addEventListener('click', reset);
        resetBtn2.addEventListener('click', reset);
        resetBtn3.addEventListener('click', reset);

        qdDecodeBtn.addEventListener('click', decodeBase64Input);

        qdCopyBtn.addEventListener('click', () => {
            if (!qdDecodedBytes) return;
            const text = new TextDecoder().decode(qdDecodedBytes);
            navigator.clipboard.writeText(text).then(() => {
                showToast(t('toastCopied'));
            }).catch(() => showToast(t('toastCopyFail')));
        });

        qdDownloadBtn.addEventListener('click', () => {
            if (!qdDecodedBytes) return;
            const knownExt = getExtension(qdDecodedMime);
            let ext;
            if (knownExt === '.bin') {
                const userExt = qdExtInput.value.trim().replace(/^\./, '');
                ext = userExt ? '.' + userExt : '.bin';
            } else {
                ext = knownExt;
            }
            const filename = 'decoded' + ext;
            downloadFile(qdDecodedBytes, filename, qdDecodedMime);
        });

        qdExtInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                qdDownloadBtn.click();
            }
        });

        qdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                decodeBase64Input();
            }
        });

        quickDecode.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            quickDecode.classList.add('dragover');
        });

        quickDecode.addEventListener('dragleave', (e) => {
            e.preventDefault();
            e.stopPropagation();
            quickDecode.classList.remove('dragover');
        });

        quickDecode.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            quickDecode.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    qdInput.value = ev.target.result;
                    decodeBase64Input();
                };
                reader.readAsText(file);
            }
        });

        function reset() {
            resultSection.classList.remove('show');
            fileInput.value = '';
            currentResult = { base64: '', base32: '', base16: '' };
            rawText = '';
            ctfResults = [];
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const uint8Array = new Uint8Array(e.target.result);
                currentResult.base64 = arrayBufferToBase64(uint8Array);
                currentResult.base32 = uint8ArrayToBase32(uint8Array);
                currentResult.base16 = uint8ArrayToBase16(uint8Array);
                const decoder = new TextDecoder('utf-8', { fatal: false });
                rawText = decoder.decode(uint8Array);
                fileName.textContent = file.name;
                fileType.textContent = file.type || t('unknown');
                fileSize.textContent = formatFileSize(file.size);
                updateOutput();
                updateExtractResult();
                updateCtfResult();
                resultSection.classList.add('show');
            };
            reader.readAsArrayBuffer(file);
        }

        function arrayBufferToBase64(uint8Array) {
            let binary = '';
            const len = uint8Array.byteLength;
            for (let i = 0; i < len; i++) binary += String.fromCharCode(uint8Array[i]);
            return btoa(binary);
        }

        function uint8ArrayToBase32(uint8Array) {
            let result = '', bits = 0, value = 0, len = uint8Array.length;
            for (let i = 0; i < len; i++) {
                value = (value << 8) | uint8Array[i];
                bits += 8;
                while (bits >= 5) { result += BASE32_CHARS[(value >>> (bits - 5)) & 31]; bits -= 5; }
            }
            if (bits > 0) result += BASE32_CHARS[(value << (5 - bits)) & 31];
            return result;
        }

        function uint8ArrayToBase16(uint8Array) {
            let result = '';
            for (let i = 0; i < uint8Array.length; i++) {
                result += BASE16_CHARS[uint8Array[i] >>> 4];
                result += BASE16_CHARS[uint8Array[i] & 0x0F];
            }
            return result;
        }

        function updateOutput() {
            const encodingConfig = {
                base64: { label: t('encLabel'), note: t('encNoteBase64') },
                base32: { label: t('encLabelBase32'), note: t('encNoteBase32') },
                base16: { label: t('encLabelBase16'), note: t('encNoteBase16') }
            };
            const result = currentResult[currentEncoding];
            base64Output.value = result;
            outputLabel.textContent = encodingConfig[currentEncoding].label;
            formatNote.textContent = encodingConfig[currentEncoding].note;
            outputLength.textContent = result.length + ' ' + t('chars');
        }

        function updateExtractResult() {
            if (!rawText) {
                extractItems.innerHTML = '<div class="extract-empty" data-i18n="extNoFile">' + t('extNoFile') + '</div>';
                extractCount.textContent = '0';
                return;
            }
            const results = {};
            if (selectedExtractTypes.length === 0) {
                extractItems.innerHTML = '<div class="extract-empty">' + t('extSelectType') + '</div>';
                extractCount.textContent = '0';
                return;
            }
            selectedExtractTypes.forEach(type => {
                const pattern = EXTRACT_PATTERNS[type];
                if (pattern) {
                    const matches = rawText.match(pattern) || [];
                    results[type] = [...new Set(matches)];
                }
            });
            let totalCount = 0, html = '';
            const credentialTypes = ['password', 'apikey', 'token', 'privatekey', 'jwt', 'awskey', 'connectionstring', 'bearertoken'];
            const cryptoTypes = ['aes', 'des', 'rsa', 'hash', 'hmac', 'ecb', 'hexkey', 'md5hash', 'sha'];
            const isCredentialMode = credentialTypes.some(t => selectedExtractTypes.includes(t));
            const isCryptoMode = cryptoTypes.some(t => selectedExtractTypes.includes(t));

            selectedExtractTypes.forEach(type => {
                const items = results[type] || [];
                totalCount += items.length;
                items.forEach(item => {
                    let itemClass = 'extract-item';
                    let displayValue = item.length > 60 ? item.substring(0, 60) + '...' : item;
                    let title = getCryptoTitle(type, item);

                    if (isCredentialMode) {
                        itemClass = 'extract-item credential';
                    } else if (isCryptoMode) {
                        itemClass = 'extract-item crypto';
                    }

                    if (type === 'ip' && !isCryptoMode) {
                        const specialIP = getSpecialIPInfo(item);
                        if (specialIP) {
                            itemClass = 'extract-item special';
                            title = specialIP;
                        } else if (isInternalIP(item)) {
                            itemClass = 'extract-item internal';
                            title = t('internalIP');
                        }
                    }

                    html += `<span class="${itemClass}" data-value="${escapeHtml(item)}" title="${title}">${escapeHtml(displayValue)}</span>`;
                });
            });
            if (totalCount === 0) {
                extractItems.innerHTML = '<div class="extract-empty">' + t('extNoMatch') + '</div>';
            } else {
                extractItems.innerHTML = html;
                extractItems.querySelectorAll('.extract-item').forEach(item => {
                    item.addEventListener('click', async () => {
                        try { await navigator.clipboard.writeText(item.dataset.value); showToast(t('toastCopied')); }
                        catch (err) { showToast(t('toastCopyFail')); }
                    });
                });
            }
            extractCount.textContent = totalCount;
        }

        function getCryptoTitle(type, value) {
            const titles = {
                aes: t('cryptoAes'),
                des: t('cryptoDes'),
                rsa: t('cryptoRsa'),
                hash: t('cryptoHash'),
                hmac: t('cryptoHmac'),
                ecb: t('cryptoEcb'),
                hexkey: t('cryptoHexKey'),
                md5hash: t('cryptoMd5'),
                sha: t('cryptoSha')
            };
            return titles[type] || value;
        }

        function getSpecialIPInfo(ip) {
            const specialIPs = {
                '127.0.0.1': t('ipLocalhost'),
                '127.0.0.2': t('ipLocalhost'),
                '0.0.0.0': t('ipAllInterfaces'),
                '255.255.255.255': t('ipBroadcast'),
                '224.0.0.1': t('ipMulticastHost'),
                '224.0.0.2': t('ipMulticastRouter'),
                '::1': t('ipLocalhostV6'),
                '::': t('ipUnspecifiedV6')
            };
            return specialIPs[ip] || null;
        }

        function isInternalIP(ip) {
            const parts = ip.split('.').map(Number);
            if (parts.length !== 4) return false;
            if (parts[0] === 10) return true;
            if (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31) return true;
            if (parts[0] === 192 && parts[1] === 168) return true;
            return false;
        }

        function updateCtfResult() {
            ctfResults = [];
            if (!rawText) {
                ctfItems.innerHTML = '<div class="extract-empty">' + t('ctfNoFile') + '</div>';
                ctfCount.textContent = '0';
                return;
            }
            const seen = new Set();
            const categories = { flags: [], keywords: [] };
            for (const [key, config] of Object.entries(CTF_PATTERNS)) {
                const matches = rawText.match(config.pattern) || [];
                [...new Set(matches)].forEach(match => {
                    if (!seen.has(match)) {
                        seen.add(match);
                        const result = { type: key, value: match, label: config.label, isFlag: config.isFlag };
                        ctfResults.push(result);
                        if (config.isFlag) categories.flags.push(result);
                        else categories.keywords.push(result);
                    }
                });
            }
            let html = '';
            if (categories.flags.length > 0) {
                html += `<div class="extract-category flags"><div class="extract-category-title">${t('ctfFlags')} (${categories.flags.length})</div><div class="extract-category-items">`;
                categories.flags.forEach(item => { html += `<span class="extract-item flag" data-value="${escapeHtml(item.value)}">${escapeHtml(item.value)}</span>`; });
                html += `</div></div>`;
            }
            if (categories.keywords.length > 0) {
                html += `<div class="extract-category"><div class="extract-category-title">${t('ctfKeywords')} (${categories.keywords.length})</div><div class="extract-category-items">`;
                categories.keywords.forEach(item => { html += `<span class="extract-item" data-value="${escapeHtml(item.value)}">${escapeHtml(item.value)}</span>`; });
                html += `</div></div>`;
            }
            if (ctfResults.length === 0) {
                ctfItems.innerHTML = '<div class="extract-empty">' + t('ctfNoResult') + '</div>';
            } else {
                ctfItems.innerHTML = html;
                ctfItems.querySelectorAll('.extract-item').forEach(item => {
                    item.addEventListener('click', async () => {
                        try { await navigator.clipboard.writeText(item.dataset.value); showToast(t('toastCopied')); }
                        catch (err) { showToast(t('toastCopyFail')); }
                    });
                });
            }
            ctfCount.textContent = ctfResults.length;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Quick Decode helpers
        const MIME_MAGIC = [
            { bytes: [0x89, 0x50, 0x4E, 0x47], mime: 'image/png' },
            { bytes: [0xFF, 0xD8, 0xFF], mime: 'image/jpeg' },
            { bytes: [0x47, 0x49, 0x46, 0x38], mime: 'image/gif' },
            { bytes: [0x52, 0x49, 0x46, 0x46], mime: 'image/webp' },
            { bytes: [0x25, 0x50, 0x44, 0x46], mime: 'application/pdf' },
            { bytes: [0x50, 0x4B, 0x03, 0x04], mime: 'application/zip' },
            { bytes: [0x49, 0x44, 0x33], mime: 'audio/mpeg' },
            { bytes: [0xFF, 0xFB], mime: 'audio/mpeg' },
            { bytes: [0x42, 0x4D], mime: 'image/bmp' },
        ];

        const MIME_EXT = {
            'image/png': '.png', 'image/jpeg': '.jpg', 'image/gif': '.gif',
            'image/webp': '.webp', 'image/bmp': '.bmp',
            'application/pdf': '.pdf', 'application/zip': '.zip',
            'audio/mpeg': '.mp3', 'text/plain': '.txt',
            'text/html': '.html', 'application/json': '.json',
            'application/xml': '.xml', 'text/xml': '.xml',
            'application/octet-stream': '.bin',
        };

        function detectMimeType(uint8Array) {
            for (const magic of MIME_MAGIC) {
                if (uint8Array.length >= magic.bytes.length) {
                    let match = true;
                    for (let i = 0; i < magic.bytes.length; i++) {
                        if (uint8Array[i] !== magic.bytes[i]) { match = false; break; }
                    }
                    if (match) {
                        if (magic.mime === 'image/webp' && uint8Array.length >= 12) {
                            const subtype = new TextDecoder().decode(uint8Array.slice(8, 12));
                            if (subtype === 'WEBP') return 'image/webp';
                            if (subtype === 'WAVE') return 'audio/wav';
                            continue;
                        }
                        return magic.mime;
                    }
                }
            }
            if (isTextContent(uint8Array)) {
                const text = new TextDecoder().decode(uint8Array.slice(0, 200));
                if (/^\s*[<]!DOCTYPE\s+html/i.test(text) || /^\s*[<]html/i.test(text)) return 'text/html';
                if (/^\s*[<][?]xml/i.test(text) || /^\s*[<][\w-]+[:\s][^>]*xmlns/i.test(text)) return 'application/xml';
                if (/^\s*[\[{]/.test(text)) return 'application/json';
                return 'text/plain';
            }
            return 'application/octet-stream';
        }

        function isTextContent(uint8Array) {
            const len = uint8Array.length;
            if (len === 0) return true;
            let nonPrintable = 0;
            const threshold = len * 0.05;
            for (let i = 0; i < len; i++) {
                const b = uint8Array[i];
                if (b === 0) { nonPrintable++; if (nonPrintable > threshold) return false; continue; }
                if (b < 0x09 || (b > 0x0D && b < 0x20) || b === 0x7F) { nonPrintable++; if (nonPrintable > threshold) return false; }
            }
            return true;
        }

        function getExtension(mimeType) {
            return MIME_EXT[mimeType] || '.bin';
        }

        function uint8ToBinaryStr(uint8Array) {
            const chunkSize = 8192;
            let result = '';
            for (let i = 0; i < uint8Array.length; i += chunkSize) {
                result += String.fromCharCode.apply(null, uint8Array.subarray(i, i + chunkSize));
            }
            return result;
        }

        function decodeBase64Input() {
            const input = qdInput.value.trim();
            if (!input) { showToast(t('qdNoInput')); return; }

            let base64 = input;
            let declaredType = null;

            const dataUriMatch = base64.match(/^data:([^;]*)(;base64)?,/i);
            if (dataUriMatch) {
                declaredType = dataUriMatch[1];
                base64 = base64.slice(dataUriMatch[0].length);
            }

            try {
                const binaryStr = atob(base64);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                }
                renderPreview(bytes, declaredType, input);
            } catch (e) {
                showToast(t('qdDecodeFail'));
                qdResult.style.display = 'none';
            }
        }

        function renderPreview(bytes, declaredType, originalInput) {
            const mimeType = declaredType || detectMimeType(bytes);
            const isImage = mimeType.startsWith('image/');
            const isText = mimeType === 'text/plain' || mimeType === 'application/json' ||
                           mimeType === 'text/html' || mimeType === 'application/xml' || mimeType === 'text/xml';
            const sizeStr = formatFileSize(bytes.length);
            const knownExt = getExtension(mimeType);
            const isUnknown = mimeType === 'application/octet-stream';

            qdDecodedBytes = bytes;
            qdDecodedMime = mimeType;

            qdPreview.innerHTML = '';

            if (isImage) {
                const img = document.createElement('img');
                img.src = declaredType ? originalInput : 'data:' + mimeType + ';base64,' + btoa(uint8ToBinaryStr(bytes));
                qdPreview.appendChild(img);
            } else if (isText) {
                const pre = document.createElement('pre');
                pre.textContent = new TextDecoder().decode(bytes);
                qdPreview.appendChild(pre);
            }

            qdPreview.style.display = isImage || isText ? 'block' : 'none';
            qdMeta.innerHTML = '<span data-i18n="qdType">' + t('qdType') + '</span>: ' + mimeType +
                               '  <span data-i18n="qdSize">' + t('qdSize') + '</span>: ' + sizeStr;

            qdCopyBtn.style.display = isText ? '' : 'none';

            if (isUnknown) {
                qdExtRow.style.display = 'flex';
                qdExtInput.value = '';
                qdExtInput.focus();
            } else {
                qdExtRow.style.display = 'none';
            }

            qdActions.style.display = 'flex';
            qdResult.style.display = 'block';
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        function downloadFile(content, filename, mimeType) {
            const type = mimeType || 'text/plain;charset=utf-8';
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(t('exportedFile', {name: filename}));
        }
    </script>
</body>
</html>
